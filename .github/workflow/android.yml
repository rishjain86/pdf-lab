name: 🚀 One-Click Auto Release

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'New Version Name (e.g., 1.8)'
        required: true
        default: '1.8'
      version_code:
        description: 'New Version Code (e.g., 8)'
        required: true
        default: '8'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: 📝 Auto-Update Versions Everywhere
      run: |
        # 1. index.html updates
        sed -i "s/const CURRENT_APP_VERSION = .*/const CURRENT_APP_VERSION = ${{ github.event.inputs.version_name }};/g" index.html
        sed -i "s/app.js?v=[0-9]*/app.js?v=${{ github.event.inputs.version_code }}/g" index.html
        sed -i "s/<span id=\"app-version-text\">.*<\/span>/<span id=\"app-version-text\">Version ${{ github.event.inputs.version_name }}<\/span>/g" index.html
        
        # 2. app.js update
        sed -i "s/const CURRENT_APP_VERSION = .*/const CURRENT_APP_VERSION = ${{ github.event.inputs.version_name }};/g" app.js
        
        # 3. version.json update with "latest" link
        echo '{"version": "${{ github.event.inputs.version_name }}", "code": ${{ github.event.inputs.version_code }}, "download_url": "https://github.com/rishjain86/Amazing-Pdf-Tool/releases/latest/download/AmazingPDF.apk"}' > version.json

    - name: 💾 Save Updated Files to GitHub Repo
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add index.html app.js version.json
        git commit -m "🚀 Auto-bump version to ${{ github.event.inputs.version_name }}" || echo "No changes to commit"
        git push

    - name: Install Dependencies
      run: npm install

    - name: Auto-Copy Files to Public for App Build
      run: |
        mkdir -p public
        cp *.html public/ || true
        cp *.js public/ || true
        cp *.css public/ || true
        cp *.json public/ || true
        cp -r assets public/ || true

    - name: Create Android Project
      run: npx cap add android || true

    - name: Generate App Icons & Splash
      run: npx @capacitor/assets generate || true

    - name: Sync App Code
      run: npx cap sync android

    - name: 📝 Update Android Build Versions
      run: |
        sed -i 's/versionCode [0-9]*/versionCode ${{ github.event.inputs.version_code }}/g' android/app/build.gradle
        sed -i 's/versionName ".*"/versionName "${{ github.event.inputs.version_name }}"/g' android/app/build.gradle

    - name: Inject AdMob App ID Automatically
      run: |
        sed -i '/<\/application>/i \        <meta-data android:name="com.google.android.gms.ads.APPLICATION_ID" android:value="ca-app-pub-6519206650027176~4620229874"/>' android/app/src/main/AndroidManifest.xml

    - name: Enable App Security & Anti-Modding (ProGuard)
      run: |
        sed -i 's/minifyEnabled false/minifyEnabled true\n            shrinkResources true/g' android/app/build.gradle

    - name: Grant Execute Permission for Gradle
      run: chmod +x android/gradlew

    - name: Build Unsigned Release APK
      run: |
        cd android
        ./gradlew assembleRelease
        cd ..

    - name: Auto-Generate Keystore & Sign APK
      run: |
        keytool -genkey -v -keystore amazingpdf.jks -keyalg RSA -keysize 2048 -validity 10000 -alias amazingpdf -dname "CN=Amazing PDF, OU=App, O=Developer, L=India, ST=India, C=IN" -storepass "amazing123" -keypass "amazing123"
        
        APK_PATH="android/app/build/outputs/apk/release/app-release-unsigned.apk"
        ZIPALIGN=$(find $ANDROID_SDK_ROOT/build-tools -name zipalign | sort -r | head -n 1)
        APKSIGNER=$(find $ANDROID_SDK_ROOT/build-tools -name apksigner | sort -r | head -n 1)
        
        $ZIPALIGN -v -p 4 $APK_PATH app-release-aligned.apk
        $APKSIGNER sign --ks amazingpdf.jks --ks-pass pass:amazing123 --ks-key-alias amazingpdf --out AmazingPDF.apk app-release-aligned.apk

    - name: 📦 Auto-Publish GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.event.inputs.version_name }}
        name: Amazing PDF v${{ github.event.inputs.version_name }}
        files: AmazingPDF.apk
        body: "🚀 Auto-generated release for Amazing PDF version ${{ github.event.inputs.version_name }}."
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: 🔥 Update Firebase Database Automatically
      env:
        FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
        NEW_VERSION: ${{ github.event.inputs.version_name }}
      run: |
        npm install firebase-admin
        node update_firebase.js
